services:
  postgres:
    image: postgres:16-alpine
    container_name: jpa-deep-dive-postgres
    environment:
      POSTGRES_DB: jpa_deep_dive
      POSTGRES_USER: app
      POSTGRES_PASSWORD: secret
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
